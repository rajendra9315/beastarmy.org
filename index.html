<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0b0b0b;
}

/* Card */
.card {
    width: 440px;
    padding: 55px 40px;
    border-radius: 22px;
    background: #141414;
    text-align: center;
    position: relative;
    box-shadow: 0 10px 50px rgba(0,0,0,0.7);
}

/* Glowing border */
.card::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: 22px;
    background: linear-gradient(120deg, #ff003c, #00f2ff, #ff003c);
    z-index: -1;
    filter: blur(12px);
    opacity: 0.6;
}

/* Profile */
.profile {
    width: 115px;
    height: 115px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 20px;
}

/* Title */
h1 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 10px;
    color: #ffffff;
}

/* Subtitle */
p {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 30px;
}

/* Button */
.join-btn {
    display: inline-block;
    padding: 16px 30px;
    border-radius: 40px;
    background: #ff003c;
    color: white;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
    transition: 0.3s ease;
}

/* Glow on hover */
.join-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(255,0,60,0.9);
}

/* After text */
.after-text {
    margin-top: 25px;
    font-size: 13px;
    color: #ddd;
    line-height: 1.6;
}

/* Highlight words */
.highlight {
    color: #ff003c;
    font-weight: 600;
}
